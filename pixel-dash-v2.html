<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL DASH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#ffd700;--red:#ff4444;--blue:#44aaff;--green:#44ff88;
  --dark:#080810;--panel:#12121e;--border:#2a2a4a;
}
body{
  background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
  font-family:'Press Start 2P',monospace;
}
#wrapper{position:relative;display:inline-block;}

/* HUD */
#hud{
  display:flex;align-items:center;justify-content:space-between;
  width:min(960px,100vw);padding:6px 8px;
  background:var(--panel);border:2px solid var(--border);
  border-bottom:none;
  font-size:8px;color:#fff;gap:8px;
}
.hud-block{display:flex;align-items:center;gap:6px;}
.hud-label{color:#888;font-size:6px;}
.hud-val{color:var(--gold);}
#lives-icons{display:flex;gap:3px;}
.life-icon{width:12px;height:12px;display:inline-block;}

canvas{
  display:block;
  width:min(960px,100vw);
  height:auto;
  aspect-ratio:16/9;
  border:2px solid var(--border);
  border-top:2px solid #333;
  image-rendering:pixelated;
  cursor:none;
}
/* scanlines */
#wrapper::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  z-index:5;
}

/* Mobile controls */
#mobile-controls{
  display:none;
  width:min(960px,100vw);padding:8px 16px;
  background:var(--panel);border:2px solid var(--border);border-top:none;
  justify-content:space-between;align-items:center;
}
@media(max-width:980px),(pointer:coarse){
  #mobile-controls{display:flex;}
  canvas,#hud,#mobile-controls{width:100vw;}
}
.dpad{display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(2,40px);gap:3px;}
.dpad-btn{
  background:#1a1a2e;border:2px solid #333;color:#fff;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;user-select:none;-webkit-user-select:none;
  touch-action:none;
}
.dpad-btn:active,.dpad-btn.pressed{background:#2a2a4e;border-color:#44aaff;}
.dpad-left{grid-column:1;grid-row:1;}
.dpad-right{grid-column:3;grid-row:1;}
.action-btns{display:flex;gap:8px;}
.action-btn{
  width:52px;height:52px;border-radius:50%;
  border:2px solid #333;color:#fff;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;touch-action:none;
}
#btn-jump{background:#1a3a1a;border-color:#44ff88;}
#btn-jump:active,#btn-jump.pressed{background:#2a5a2a;}
#btn-run{background:#3a1a1a;border-color:#ff4444;font-size:7px;}
#btn-run:active,#btn-run.pressed{background:#5a2a2a;}

/* Overlay */
#overlay{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,4,12,0.96);
}
#overlay.hidden{display:none;}
.ov-title{
  font-size:clamp(18px,4vw,36px);letter-spacing:4px;
  color:var(--gold);
  text-shadow:0 0 20px rgba(255,215,0,0.6),4px 4px 0 #7a5000;
  margin-bottom:12px;
  animation:titlebob 2s ease-in-out infinite;
}
@keyframes titlebob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.ov-sub{font-size:8px;color:#88aaff;letter-spacing:2px;margin-bottom:32px;}
.ov-menu{display:flex;flex-direction:column;gap:8px;align-items:center;}
.ov-btn{
  font-family:'Press Start 2P',monospace;font-size:9px;
  background:var(--panel);border:2px solid var(--border);
  color:#fff;padding:10px 24px;cursor:pointer;letter-spacing:1px;
  transition:all 0.1s;
}
.ov-btn:hover,.ov-btn.selected{background:#1a1a3a;border-color:var(--gold);color:var(--gold);}
#levelSelect .ov-btn{font-size:7px;padding:8px 14px;background:#0d0d2e;border:2px solid #ffdd00;color:#ffdd00;}
#levelSelect .ov-btn:hover{background:#1a1a4e;color:#fff;border-color:#fff;}
.ov-controls{
  font-size:7px;color:#555;line-height:2.6;text-align:center;
  margin-bottom:24px;
}
.ov-controls span{color:#888;}
.blink{animation:blink 1s step-start infinite;}
@keyframes blink{50%{opacity:0;}}
.stars-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
</style>
</head>
<body>

<div id="overlay">
  <div class="stars-bg" id="starsBg"></div>
  <div class="ov-title">PIXEL DASH</div>
  <div class="ov-sub">★ RETRO PLATFORMER ★</div>
  <div class="ov-controls">
    <span>MOVE</span> — ARROW KEYS / WASD<br>
    <span>JUMP</span> — SPACE / UP / Z<br>
    <span>RUN</span> — HOLD SHIFT / X<br>
    <span>STOMP</span> — LAND ON ENEMIES
  </div>
  <div class="ov-menu">
    <button class="ov-btn blink" id="startBtn">▶ START GAME</button>
  </div>
  <div id="levelSelect" style="display:none;margin-top:14px;">
    <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:#ffdd00;margin-bottom:10px;letter-spacing:2px;">— SELECT LEVEL —</div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="ov-btn" id="lvlBtn0">LEVEL 1</button>
      <button class="ov-btn" id="lvlBtn1">LEVEL 2</button>
      <button class="ov-btn" id="lvlBtn2">LEVEL 3</button>
    </div>
  </div>
</div>

<div id="wrapper">
  <div id="hud">
    <div class="hud-block">
      <div><div class="hud-label">SCORE</div><div class="hud-val" id="scoreVal">000000</div></div>
    </div>
    <div class="hud-block">
      <div><div class="hud-label">COINS</div><div class="hud-val" id="coinVal">00</div></div>
    </div>
    <div class="hud-block" id="powerup-hud" style="opacity:0;transition:opacity 0.3s">
      <div><div class="hud-label">POWER</div><div class="hud-val" id="powerVal" style="color:#f8f">---</div></div>
    </div>
    <div class="hud-block">
      <div><div class="hud-label">LIVES</div><div id="lives-icons"></div></div>
    </div>
    <div class="hud-block">
      <div><div class="hud-label">WORLD</div><div class="hud-val" id="levelVal">1-1</div></div>
    </div>
    <div class="hud-block">
      <button id="restartHudBtn" style="font-family:'Press Start 2P',monospace;font-size:6px;background:#1a1a2e;border:1px solid #444;color:#aaa;padding:4px 7px;cursor:pointer;letter-spacing:1px;" title="Restart game">↺ RESTART</button>
    </div>
  </div>
  <canvas id="c" width="960" height="540"></canvas>
  <div id="mobile-controls">
    <div class="dpad">
      <div class="dpad-btn dpad-left" id="btn-left">◀</div>
      <div class="dpad-btn dpad-right" id="btn-right">▶</div>
    </div>
    <div class="action-btns">
      <div class="action-btn" id="btn-run">RUN</div>
      <div class="action-btn" id="btn-jump">▲</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// AUDIO ENGINE (Web Audio)
// ═══════════════════════════════════════════════════════════════
let AC;
function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}

function beep(freq,dur,type='square',vol=0.15,decay=0.9){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime);
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);
}
function sfxJump(){beep(300,0.1,'square',0.12);setTimeout(()=>beep(500,0.1,'square',0.08),60);}
function sfxCoin(){beep(880,0.05,'sine',0.18);setTimeout(()=>beep(1200,0.08,'sine',0.14),50);}
function sfxStomp(){beep(150,0.12,'square',0.2);beep(80,0.2,'sawtooth',0.15);}
function sfxDie(){beep(440,0.1,'sawtooth',0.2);setTimeout(()=>beep(300,0.1,'sawtooth',0.18),100);setTimeout(()=>beep(200,0.2,'sawtooth',0.15),200);}
function sfxPowerup(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'sine',0.2),i*80));}
function sfxWin(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.15,'sine',0.22),i*100));}
function sfxHurt(){beep(200,0.3,'sawtooth',0.25);}
function sfxBreak(){beep(180,0.05,'square',0.2);beep(120,0.1,'square',0.18);}

// ═══════════════════════════════════════════════════════════════
// CANVAS & CONSTANTS
// ═══════════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let activeCtx=ctx;
ctx.imageSmoothingEnabled=false;
const W=960,H=540,TILE=36;
const GRAVITY=0.52,JUMP_FORCE=-10.0,RUN_SPEED=3.8,WALK_SPEED=2.2;
const MAX_FALL=14;

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════
const keys={},just={};
const mobileState={left:false,right:false,jump:false,run:false};

document.addEventListener('keydown',e=>{
  if(!keys[e.code])just[e.code]=true;
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
});
document.addEventListener('keyup',e=>delete keys[e.code]);

function setupMobile(){
  const map={
    'btn-left':'left','btn-right':'right',
    'btn-jump':'jump','btn-run':'run'
  };
  Object.entries(map).forEach(([id,action])=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.addEventListener('pointerdown',e=>{
      e.preventDefault();initAudio();
      mobileState[action]=true;
      if(action==='jump')just['Space']=true;
      el.classList.add('pressed');
    });
    el.addEventListener('pointerup',()=>{mobileState[action]=false;el.classList.remove('pressed');});
    el.addEventListener('pointerleave',()=>{mobileState[action]=false;el.classList.remove('pressed');});
  });
}
setupMobile();

function isLeft(){return keys['ArrowLeft']||keys['KeyA']||mobileState.left;}
function isRight(){return keys['ArrowRight']||keys['KeyD']||mobileState.right;}
function isJump(){return keys['Space']||keys['ArrowUp']||keys['KeyW']||keys['KeyZ']||mobileState.jump;}
function isRun(){return keys['ShiftLeft']||keys['ShiftRight']||keys['KeyX']||mobileState.run;}
function consumeJump(){delete just['Space'];delete just['ArrowUp'];delete just['KeyW'];delete just['KeyZ'];mobileState.jump=false;}

// ═══════════════════════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════════════════════
const starsBg=document.getElementById('starsBg');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.style.cssText=`position:absolute;border-radius:50%;background:#fff;
    width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;
    left:${Math.random()*100}%;top:${Math.random()*100}%;
    opacity:${0.3+Math.random()*0.7};
    animation:blink ${1+Math.random()*3}s step-start infinite;
    animation-delay:${Math.random()*3}s;`;
  starsBg.appendChild(s);
}

// ═══════════════════════════════════════════════════════════════
// PIXEL ART DRAWING
// ═══════════════════════════════════════════════════════════════
function px(color){ctx.fillStyle=color;}
function rect(x,y,w,h,c){activeCtx.fillStyle=c;activeCtx.fillRect(~~x,~~y,w,h);}

// Animated tile offsets
let tileAnim=0;

function drawGround(x,y){
  rect(x,y,TILE,TILE,'#3d8c2f');
  rect(x,y,TILE,8,'#52b038');
  rect(x+2,y+2,TILE-4,3,'#6cd44a');
  // grass tufts
  rect(x+3,y,2,3,'#7ee855');rect(x+10,y,2,4,'#6cd44a');rect(x+22,y,2,3,'#7ee855');
  // dirt
  rect(x,y+8,TILE,TILE-8,'#8b5e3c');
  rect(x+4,y+12,5,4,'#6b3e1c');rect(x+16,y+20,6,3,'#6b3e1c');rect(x+10,y+26,4,3,'#6b3e1c');
  // edge shading
  rect(x,y+8,2,TILE-8,'#9b6e4c');rect(x+TILE-2,y+8,2,TILE-8,'#6b3e1c');
}
function drawBrick(x,y){
  rect(x,y,TILE,TILE,'#6b2a10');
  // mortar lines
  rect(x,y+TILE/2-1,TILE,2,'#4a1a08');
  rect(x+TILE/2-1,y,2,TILE/2-1,'#4a1a08');
  rect(x+TILE/4-1,y+TILE/2+1,2,TILE/2-1,'#4a1a08');
  rect(x+3*TILE/4-1,y+TILE/2+1,2,TILE/2-1,'#4a1a08');
  // highlight
  rect(x+2,y+2,TILE/2-4,TILE/2-4,'#8a3518');
  rect(x+TILE/2+2,y+TILE/2+2,TILE/2-4,TILE/2-4,'#d8643c');
  rect(x+3,y+3,4,2,'#e87050');
}
function drawSky(x,y){
  rect(x,y,TILE,TILE,'#5c94fc');
  rect(x,y,TILE,TILE,'rgba(80,130,220,0.3)');
}
function drawSnowflake(x,y){
  const cx=~~(x-CAM.x);
  const sz=2+Math.floor(((x*7+y*13)&3));
  const c='rgba(200,230,255,0.9)';
  rect(cx-sz,y-1,sz*2+1,3,c);
  rect(cx-1,y-sz,3,sz*2+1,c);
  rect(cx-sz+1,y-sz+1,2,2,c);
  rect(cx+sz-2,y-sz+1,2,2,c);
  rect(cx-sz+1,y+sz-2,2,2,c);
  rect(cx+sz-2,y+sz-2,2,2,c);
}

function drawCloud(x,y,w){
  const cx=x-CAM.x;
  if(cx<-w-20||cx>W+20)return;
  rect(cx,y,w,16,'rgba(255,255,255,0.9)');
  rect(cx+8,y-10,w-20,14,'rgba(255,255,255,0.9)');
  rect(cx+4,y-5,18,8,'rgba(255,255,255,0.9)');
  rect(cx+w-22,y-5,18,8,'rgba(255,255,255,0.9)');
  // inner highlight
  rect(cx+10,y+2,w-24,4,'rgba(255,255,255,1)');
}
function drawPipeTop(x,y){
  rect(x-4,y,TILE+8,10,'#1e9e4a');
  rect(x-2,y+1,TILE+4,5,'#28c85a');
  rect(x,y+10,TILE,TILE-10,'#18843a');
  rect(x+5,y+12,8,TILE-14,'#28c85a');
  rect(x,y,2,10,'#12602a');
}
function drawPipeBody(x,y){
  rect(x,y,TILE,TILE,'#18843a');
  rect(x+5,y,8,TILE,'#28c85a');
  rect(x,y,2,TILE,'#12602a');
}
function drawIceBrick(x,y){
  rect(x,y,TILE,TILE,'#c8e8ff');
  rect(x,y+TILE/2-1,TILE,2,'#88bbdd');
  rect(x+TILE/2-1,y,2,TILE/2-1,'#88bbdd');
  rect(x+TILE/4-1,y+TILE/2+1,2,TILE/2-1,'#88bbdd');
  rect(x+TILE*3/4-1,y+TILE/2+1,2,TILE/2-1,'#88bbdd');
  rect(x,y,TILE,3,'#eef8ff');
  rect(x+2,y+1,6,1,'#ffffff');
  rect(x+TILE-10,y+1,5,1,'#ffffff');
  rect(x+4,y+6,3,3,'rgba(255,255,255,0.8)');
  rect(x+TILE-10,y+TILE-10,4,4,'rgba(150,200,255,0.6)');
}

function drawIceTile(x,y){
  // Chunky ice cliff — matches New Super Mario Bros Wii ice world
  rect(x,y,TILE,TILE,'#5b8fbf');        // deep ice blue body
  rect(x,y,TILE,6,'#a8d4f0');           // snow cap top
  rect(x+2,y+1,8,3,'#dff0ff');          // bright snow highlight
  rect(x+TILE-10,y+2,6,2,'#dff0ff');
  rect(x,y,2,TILE,'#7aaed4');           // left face sheen
  rect(x,y+TILE-4,TILE,4,'#2a5a82');    // bottom deep shadow
  // interior ice texture lines
  rect(x+6, y+8,1,12,'#4a7aaa');
  rect(x+20,y+5,1,16,'#4a7aaa');
  rect(x+30,y+10,1,10,'#4a7aaa');
}
function drawLavaTile(x,y){
  const flicker=Math.sin(tileAnim*0.3+x*0.05)*3;
  rect(x,y,TILE,TILE,'#cc3300');
  rect(x,y,TILE,8+flicker,'#ff6622');
  rect(x+4,y+2,6,4+flicker,'#ffaa44');
  rect(x+16,y+4,5,3+flicker,'#ffcc66');
  rect(x,y+TILE-4,TILE,4,'#991100');
}
function drawCastle(x,y){
  rect(x,y,TILE,TILE,'#888');
  rect(x,y,8,8,'#666');rect(x+TILE-8,y,8,8,'#666');
  rect(x+TILE/2-4,y,8,8,'#aaa');
  rect(x+2,y+10,TILE-4,TILE-10,'#999');
  rect(x+TILE/2-4,y+16,8,TILE-16,'#555');// door
}

// ═══════════════════════════════════════════════════════════════
// MARIO — real sprite sheet frames, extracted + scaled to 48px tall

// Preload Image objects from base64 data
const SPR={};
const SPR_LOADED={};
(function(){
  Object.entries(SPR_DATA).forEach(([k,src])=>{
    const im=new Image();
    im.onload=()=>{ SPR[k]=im; SPR_LOADED[k]=true; };
    im.src=src;
  });
})();

// TILE PRE-RENDERING — draw each tile type once to an offscreen canvas
// ═══════════════════════════════════════════════════════════════
const TILE_CACHE={};
function initTileCache(){
  const types={ground:drawGround, brick:drawBrick, ice:drawIceTile,
               pipe_top:drawPipeTop, pipe_body:drawPipeBody};
  Object.entries(types).forEach(([type,drawFn])=>{
    const oc=document.createElement('canvas');
    oc.width=TILE; oc.height=TILE;
    activeCtx=oc.getContext('2d'); // redirect rect() calls
    drawFn(0,0);
    activeCtx=ctx; // restore
    TILE_CACHE[type]=oc;
  });
}

function drawPlayer(p){
  const x=~~(p.x-CAM.x), y=~~(p.y-CAM.y);
  if(p.invincible>0 && Math.floor(FC/3)%2===0) return;

  const isStar = p.powerup==='star';
  const isFire = p.powerup==='fire';

  // Pick animation frame key
  let key;
  if(p.dead){
    // Use walk1 flipped upside-down for death tumble
    key = 'walk6_1';
  } else if(p.throwingFire && isFire){
    key = p.facing===-1 ? 'fire_throw_left' : 'fire_throw';
  } else if(isStar){
    // Star: cycle star1-4
    const sf = (Math.floor(p.animTimer/6) % 4) + 1;
    key = p.facing===-1 ? `star${sf}_left` : `star${sf}`;
  } else if(p.crouching){
    if(Math.abs(p.dx)<0.3){
      // Stationary: idle crouch frame only
      key = p.facing===-1 ? 'crouch1_left' : 'crouch1';
    } else {
      // Moving: animate frames 2-4
      const crate = Math.abs(p.dx)>2 ? 5 : 9;
      const cf = (Math.floor(p.animTimer/crate) % 3) + 2;
      key = p.facing===-1 ? `crouch${cf}_left` : `crouch${cf}`;
    }
  } else if(p.state==='jump'){
    if(isFire) key = p.facing===-1 ? 'fireball1_left' : 'fireball1';
    else key = p.facing===-1 ? 'walk6_2_left' : 'walk6_2'; // mid-air pose
  } else if(p.state==='walk'){
    const fast = Math.abs(p.dx) > 2.5;
    const rate = fast ? 4 : 8;
    const wf = (Math.floor(p.animTimer/rate) % 6) + 1;
    if(isFire){
      const ff = (Math.floor(p.animTimer/rate) % 4) + 1;
      key = p.facing===-1 ? `fireball${ff}_left` : `fireball${ff}`;
    } else {
      key = p.facing===-1 ? `walk6_${wf}_left` : `walk6_${wf}`;
    }
  } else if(p.isClinging){
    key = p.facing===-1 ? 'walk6_3_left' : 'walk6_3';
  } else {
    if(isFire){
      key = p.facing===-1 ? 'fireball1_left' : 'fireball1';
    } else {
      key = p.facing===-1 ? 'walk6_1_left' : 'walk6_1';
    }
  }

  const im = SPR[key];
  if(!im) return;

  // Draw sprites at fixed height, natural width — bigger when mushroom collected
  const isBig = p.powerup==='big'||p.powerup==='star';
  const sprScale = isBig ? 1.22 : 1.0;
  const dh = ~~(im.height * sprScale);

  const dx = ~~(x + p.width/2 - dw/2);

  ctx.save();
  ctx.imageSmoothingEnabled = false;

  // Star rainbow flash
  if(isStar){
    const hue = (FC*8) % 360;
    ctx.filter = `hue-rotate(${hue}deg) saturate(2)`;
  }

  // Death flip
  if(p.dead){
    ctx.translate(dx+dw/2, dy+dh/2);
    ctx.rotate(Math.min(p.deadTimer*0.08, Math.PI));
    ctx.drawImage(im, -dw/2, -dh/2, dw, dh);

  }

}

let particles=[],floatTexts=[],screenShake=0;

function spawnParticles(x,y,color,n=8,speed=3){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=speed*(0.5+Math.random());
    particles.push({x,y,dx:Math.cos(a)*s,dy:Math.sin(a)*s-1,
      life:35+Math.random()*25,maxLife:60,color,size:2+Math.random()*4});
  }
}
function spawnFloat(x,y,text,color='#ffd700'){
  floatTexts.push({x,y:y-10,text,color,life:55,dy:-1.2});
}
function shake(amt=4){screenShake=Math.max(screenShake,amt);}

function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.dy+=0.12;p.dx*=0.94;p.life--;p.size*=0.97;});
  floatTexts=floatTexts.filter(f=>f.life>0);
  floatTexts.forEach(f=>{f.y+=f.dy;f.dy*=0.96;f.life--;});
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    rect(p.x-p.size/2,p.y-p.size/2,p.size,p.size,p.color);
  });
  ctx.globalAlpha=1;
  ctx.font='bold 9px monospace';
  floatTexts.forEach(f=>{
    ctx.globalAlpha=f.life/55;
    ctx.fillStyle=f.color;
    ctx.fillText(f.text,~~f.x,~~f.y);
  });
  ctx.globalAlpha=1;
}

// CAMERA
// ═══════════════════════════════════════════════════════════════
const CAM={x:0,y:0,targetX:0};
function updateCamera(p,levelW){
  CAM.targetX=p.x-W/2+p.width/2;
  CAM.targetX=Math.max(0,Math.min(levelW*TILE-W,CAM.targetX));
  CAM.x+=(CAM.targetX-CAM.x)*0.1;
  // Y camera: smooth vertical follow
  const levelH=levelData.map.length*TILE;
  // L3: camera biased upward so player sees platforms above
  const camVertBias = levelIdx===2 ? H*0.75 : H*0.55;
  const targetY=Math.max(0,Math.min(levelH-H, p.y-camVertBias+p.height/2));
  CAM.y=CAM.y+(targetY-CAM.y)*0.12;
  if(screenShake>0){
    CAM.x+=Math.sin(FC*0.8)*screenShake;
    CAM.y+=Math.cos(FC*0.7)*screenShake*0.5;
    screenShake*=0.8;if(screenShake<0.3)screenShake=0;
  }
}

// ═══════════════════════════════════════════════════════════════
// COLLISION
// ═══════════════════════════════════════════════════════════════
function rectsOverlap(a,b){
  const aw=a.width??a.w, ah=a.height??a.h;
  const bw=b.width??b.w, bh=b.height??b.h;
  return a.x<b.x+bw&&a.x+aw>b.x&&a.y<b.y+bh&&a.y+ah>b.y;
}
function resolveVsTiles(ent,tiles,isEnemy){
  ent.grounded=false;
  let hitWall=false;
  for(const t of tiles){
    if(isEnemy && t.type==='lava') continue; // enemies fall into lava
    if(t.type==='lava' && !(ent===player && player.powerup==='star')) continue; // lava kills non-star players
    if(t.type==='breakice'){
      const b=breakables[tiles.indexOf(t)>=0?tiles.findIndex(tt=>tt===t):0];
      if(b && !b.alive) continue; // broken blocks have no collision
    }
    if(!rectsOverlap(ent,t))continue;
    const tw=t.width??t.w, th=t.height??t.h;
    const ox=Math.min(ent.x+ent.width,t.x+tw)-Math.max(ent.x,t.x);
    const oy=Math.min(ent.y+ent.height,t.y+th)-Math.max(ent.y,t.y);
    if(ox<oy){
      const hitLeft = ent.x+ent.width/2 < t.x+tw/2;
      ent.x += hitLeft ? -ox : ox;
      if(!isEnemy){ ent.dx=0; ent.wallDir=hitLeft?-1:1; ent.wallTimer=8; }
      else hitWall=true;
    } else {
      if(ent.dy>=0){ent.y=t.y-ent.height;ent.dy=0;ent.grounded=true;}
      else{ent.y=t.y+th;ent.dy=0;}
    }
  }
  return hitWall;
}

let FC=0,score=0,lives=3,coinCount=0,levelIdx=0;

let piranhas=[]; // piranha plants
let icicles=[]; // falling icicles (level 3)
let movingPlatforms=[]; // moving cloud/lift platforms (level 3)
let starBlocks=[];      // disappearing star blocks (level 3)
let breakables=[]; // breakable ice blocks (level 3)
let windZones=[]; // wind push zones (level 3)
let switches=[]; // momentum-activated switches (level 3)
let gameRunning=false;

function buildLevel(idx){
  levelData=LEVELS[idx%LEVELS.length];
  levelW=levelData.width;
  const map=levelData.map;
  tiles=[];coins=[];powerupBoxes=[];powerupsOnGround=[];fireballs=[];piranhas=[];icicles=[];breakables=[];windZones=[];switches=[];movingPlatforms=[];starBlocks=[];
  portalX=null;portalY=null;

  for(let r=0;r<map.length;r++){
    for(let c=0;c<map[r].length;c++){
      const ch=map[r][c],x=c*TILE,y=r*TILE;
      if(ch==='G')tiles.push({x,y,w:TILE,h:TILE,type:'ground'});
      else if(ch==='B')tiles.push({x,y,w:TILE,h:TILE,type:'brick'});
      else if(ch==='I')tiles.push({x,y,w:TILE,h:TILE,type:'ice'});
      else if(ch==='L')tiles.push({x,y,w:TILE,h:TILE,type:'lava',deadly:true});
      else if(ch==='^')tiles.push({x,y,w:TILE,h:TILE,type:'pipe_top'});
      else if(ch==='v')tiles.push({x,y,w:TILE,h:TILE,type:'pipe_body'});
      else if(ch==='c')coins.push({x:x+4,y:y+4,collected:false});
      else if(ch==='Q')powerupBoxes.push({x,y,w:TILE,h:TILE,used:false,type:'random'});
      else if(ch==='P'){portalX=x;portalY=y;}
      else if(ch==='X'){
        // Breakable ice block — tracked separately, also added as tile initially
        breakables.push({x,y,w:TILE,h:TILE,alive:true,cracked:false,fromMap:true});
        tiles.push({x,y,w:TILE,h:TILE,width:TILE,height:TILE,type:'breakice',_breakIdx:breakables.length-1});
      }
      else if(ch==='D'){
        // Crumbling platform — solid until stepped on, then 45-frame countdown
        const cIdx = starBlocks.length; // reuse starBlocks array for crumbles
        starBlocks.push({x,y,w:TILE,h:TILE,delay:45,timer:0,state:'solid',alive:true,crumble:true});
        tiles.push({x,y,w:TILE,h:TILE,width:TILE,height:TILE,type:'crumble',_sbIdx:cIdx});
      }
    }
  }

  // Build pipes from pipe definitions — place tiles and create piranhas
  if(levelData.pipes){
    const groundRow=map.length-1;// last row = ground
    levelData.pipes.forEach(pipe=>{
      const col=pipe.col;
      const rows=pipe.bodyRows||1;
      // Find the ground row y
      let groundY=0;
      for(let r=map.length-1;r>=0;r--){
        if(map[r][col]==='G'||map[r][col]==='L'){groundY=r*TILE;break;}
      }
      // pipe top tile
      const topY=groundY-(rows+1)*TILE;
      tiles.push({x:col*TILE,y:topY,w:TILE,h:TILE,type:'pipe_top'});
      // pipe body tiles
      for(let i=0;i<rows;i++){
        tiles.push({x:col*TILE,y:topY+TILE*(i+1),w:TILE,h:TILE,type:'pipe_body'});
      }
      // piranha plant
      if(pipe.piranha){
        piranhas.push({
          x:col*TILE,
          pipeTopY:topY,
          w:TILE,
          h:TILE*1.2,
          offset:0,       // current y offset (0=inside pipe, negative=poking out)
          state:'hiding', // hiding|rising|out|lowering
          timer:Math.random()*120|0, // stagger initial timing
          alive:true,
        });
      }
    });
  }
  enemies=levelData.enemies.map(e=>({
    ...e,width:24,height:24,dx:e.dir*(e.type==='flyer'?1.2:0.7),dy:0,
    grounded:false,alive:true,stomped:false,stompTimer:0,frame:0,animTimer:0,
    startX:e.x,flyY:e.y,health:e.type==='koopa'?2:1
  }));

  clouds=[];
  for(let i=0;i<18;i++){
    clouds.push({x:Math.random()*levelW*TILE,y:15+Math.random()*90,
      w:50+Math.random()*90,speed:0.15+Math.random()*0.25,layer:Math.floor(Math.random()*3)});
  }

  player={
    x:(levelIdx===2 ? TILE*7 : levelIdx===3 ? TILE*2 : TILE*2),y:(levelIdx===1 ? 11*TILE-44 : levelIdx===2 ? 43*TILE-44 : H-TILE*3),width:28,height:44,
    dx:0,dy:0,grounded:false,facing:1,crouching:false,
    frame:0,animTimer:0,walkCycle:0,state:'idle',
    invincible:0,dead:false,deadTimer:0,
    powerup:null,powerupTimer:0,
    wallTimer:0,wallDir:0
  };

  // ── Moving platforms (initialized once here, updated each frame in update()) ──
  movingPlatforms = (levelData.movingPlatforms||[]).map(mp=>({
    x:mp.x, y:mp.y, w:mp.w, h:mp.h,
    dx:mp.dx||0, dy:mp.dy||0,
    minX:'minX' in mp ? mp.minX : 0,
    maxX:'maxX' in mp ? mp.maxX : 0,
    minY:'minY' in mp ? mp.minY : 0,
    maxY:'maxY' in mp ? mp.maxY : 0,
    type:mp.type||'cloud'
  }));

  // ── Star blocks (initialized once, state tracked per-block) ──
  starBlocks = (levelData.starBlocks||[]).map(sb=>({
    x: sb.col*TILE, y: sb.row*TILE, w:TILE, h:TILE,
    delay: sb.delay||90, timer:0, state:'solid', alive:true
  }));

  // ── Wind zones (initialized once from rowStart/rowEnd) ──
  windZones = (levelData.windZones||[]).map(wz=>({
    y1: wz.rowStart*TILE,
    y2: wz.rowEnd*TILE,
    force: wz.force
  }));

  CAM.x=0;
  CAM.y = levelIdx===2 ? Math.max(0, levelData.map.length*TILE - H) : 0;
  initTileCache();
  updateHUD();
}

function drawStarTimer(){
  if(player?.powerup!=='star'||!player.powerupTimer) return;
  const secs=Math.ceil(player.powerupTimer/60);
  const pct=player.powerupTimer/1800;
  const barW=120, barH=10;
  const bx=W/2-barW/2, by=12;
  // Flash warning when under 5 seconds
  const warn=secs<=5;
  if(warn && FC%10<5) return; // blink
  // Background
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(bx-2,by-2,barW+4,barH+18);
  // Bar
  const barColor=pct>0.3?'#ffdd00':pct>0.1?'#ff8800':'#ff2200';
  ctx.fillStyle='#333';
  ctx.fillRect(bx,by,barW,barH);
  ctx.fillStyle=barColor;
  ctx.fillRect(bx,by,barW*pct,barH);
  // Label
  ctx.fillStyle='#fff';
  ctx.font='bold 8px monospace';
  ctx.textAlign='center';
  ctx.fillText(`⭐ STAR: ${secs}s`,W/2,by+barH+10);
  ctx.textAlign='left';
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=String(score).padStart(6,'0');
  document.getElementById('coinVal').textContent=String(coinCount).padStart(2,'0');
  document.getElementById('levelVal').textContent=levelData?.name?.split(' ')[1]||'1-1';
  const li=document.getElementById('lives-icons');
  li.innerHTML='';
  for(let i=0;i<Math.min(lives,5);i++){
    const s=document.createElement('canvas');s.width=12;s.height=12;s.className='life-icon';
    const c=s.getContext('2d');
    c.fillStyle='#dd2222';c.fillRect(1,0,10,5);c.fillRect(3,0,6,8);
    c.fillStyle='#ff4444';c.fillRect(2,1,4,3);
    li.appendChild(s);
  }
  const ph=document.getElementById('powerup-hud');
  const pv=document.getElementById('powerVal');
  if(player?.powerup){
    ph.style.opacity='1';
    pv.textContent=player.powerup==='big'?'BIG':player.powerup==='fire'?'FIRE':'STAR';
    pv.style.color=player.powerup==='fire'?'#ff8800':player.powerup==='star'?'#ffff00':'#88ffff';
  } else {
    ph.style.opacity='0';
  }
}

function killPlayer(){
  if(player.invincible>0)return;
  if(player.powerup){
    player.powerup=null;player.invincible=120;
    player.width=20;player.height=28;
    sfxHurt();shake(3);updateHUD();
    spawnParticles(player.x+10,player.y+14,'#ff8888',12,4);
  } else {
    player.dead=true;player.dy=-9;
    sfxDie();shake(6);
    spawnParticles(player.x+10,player.y+14,'#ff4444',20,5);
  }
}

function update(){
  FC++;tileAnim++;
  updateParticles();
  // Level 3: twinkling star particles in sky
  if(levelIdx===2 && FC%3===0){
    const sx=CAM.x+Math.random()*W;
    const sy=CAM.y+Math.random()*H;
    spawnParticles(~~sx,~~sy,'#aaaaff',1,0);
  }

  if(!gameRunning)return;
  // Hit-stop freeze
  if(player && player._hitstop>0){ player._hitstop--; return; }

  // Player death sequence
  if(player.dead){
    player.deadTimer++;
    player.dy+=GRAVITY;player.y+=player.dy;
    if(player.deadTimer>90){
      lives--;
      if(lives<=0){showGameOver();}
      else{buildLevel(levelIdx);}
    }
    updateCamera(player,levelW);return;
  }

  // Player powerup star timer
  if(player.powerupTimer>0){player.powerupTimer--;if(player.powerupTimer===0&&player.powerup==='star'){player.powerup=null;updateHUD();}}
  if(player.invincible>0)player.invincible--;

  // Movement
  const lvlBoost = levelIdx===2 ? 1.35 : levelIdx===3 ? 1.5 : 1.0;
  const spd=(isRun()?(player.powerup?RUN_SPEED*1.2:RUN_SPEED):WALK_SPEED)*lvlBoost;
  const friction = levelIdx===3 ? (player.grounded ? 0.96 : 0.98) : (player.grounded ? 0.78 : 0.9);
  const accel = levelIdx===3 ? (player.grounded ? 0.12 : 0.06) : (player.grounded ? 0.28 : 0.18);

  if(isRight()){
    if(!player.crouching){ player.dx+=(spd-player.dx)*accel; } else { player.dx+=(0.8-player.dx)*0.15; } player.facing=1;
    player.state='walk';
  } else if(isLeft()){
    if(!player.crouching){ player.dx+=(-spd-player.dx)*accel; } else { player.dx+=(-0.8-player.dx)*0.15; } player.facing=-1;
    player.state='walk';
  } else {
    player.dx*=friction;
    if(Math.abs(player.dx)<0.1)player.dx=0;
    player.state='idle';
  }

  // Crouch — hold DOWN while grounded
  if(!player.dead){
    const wantCrouch=(keys['ArrowDown']||keys['KeyS']);
    const wasCrouching=player.crouching;
    player.crouching = wantCrouch && player.grounded;
    if(player.crouching && !wasCrouching){
      // Shrink hitbox — shift y down so feet stay on ground
      player.y += (44 - 15);
      player.height = 15;
    } else if(!player.crouching && wasCrouching){
      // Try to restore full height
      const restored = {x:player.x, y:player.y-(44-15), width:player.width, height:44};
      const blocked = tiles.some(t=>rectsOverlap(restored,{x:t.x,y:t.y,width:t.w||t.width,height:t.h||t.height}));
      if(!blocked){ player.y -= (44-15); player.height = 44; }
    }
  }

  // Jump — check justPressed
  const wantJump=just['Space']||just['ArrowUp']||just['KeyW']||just['KeyZ'];
  if(wantJump&&player.grounded&&!player.crouching){
    player.dy=JUMP_FORCE-(isRun()?0.8:0);
    player.grounded=false;player.state='jump';
    sfxJump();
    spawnParticles(player.x+10,player.y+player.height,'#fff',4,2);
  }
  // Wall jump + wall slide — only in level 3
  if(levelIdx===2){
    if(player.wallTimer>0) player.wallTimer--;
    const isClingWall = !player.grounded && player.wallTimer>0;
    player.isClinging = isClingWall;
    // Wall slide: slow fall when clinging
    if(isClingWall && player.dy>1){
      player.dy = Math.min(player.dy, 1.5);
      const wx = player.wallDir===1 ? player.x+player.width : player.x;
      spawnParticles(wx, player.y+player.height*0.5, '#aaddff', 2, 1);
    }
    if(wantJump && isClingWall){
      player.dy = JUMP_FORCE * 0.9;
      player.dx = player.wallDir * 5;
      player.facing = player.wallDir;
      player.wallTimer = 0;
      player.isClinging = false;
      player._hitstop = 2;
      sfxJump();
      spawnParticles(player.x+10, player.y+player.height/2, '#44ccff', 10, 3);
    }
  }
  // Held jump = higher
  if(isJump()&&player.dy<-3)player.dy-=0.2;
  // Clear just-pressed
  delete just['Space'];delete just['ArrowUp'];delete just['KeyW'];delete just['KeyZ'];

  player.dy=Math.min(player.dy+GRAVITY,MAX_FALL);
  player.x+=player.dx;player.y+=player.dy;
  // Treat Q boxes as solid tiles for stepping on
  // Only unused Q boxes are solid — used boxes can be passed through freely
  const qAsTiles = powerupBoxes.filter(b=>!b.used).map(b=>({x:b.x,y:b.y,w:b.w,h:b.h,width:b.w,height:b.h,type:'qbox',_box:b}));
  // Moving platforms as solid tiles
  const mpAsTiles = movingPlatforms.map(mp=>({x:mp.x,y:mp.y,w:mp.w,h:mp.h,width:mp.w,height:mp.h,type:'brick'}));
  // Star blocks as solid tiles (while alive)
  const sbAsTiles = starBlocks.filter(sb=>sb.alive&&sb.state!=='gone').map(sb=>({x:sb.x,y:sb.y,w:sb.w,h:sb.h,width:sb.w,height:sb.h,type:'brick'}));
  const prevDy = player.dy;
  resolveVsTiles(player, [...tiles.filter(t=>t.type!=='lava'||(player.powerup==='star')), ...qAsTiles, ...mpAsTiles, ...sbAsTiles]);
  // If Mario was moving up and now dy was zeroed by a Q box above — trigger it
  if(prevDy < 0 && player.dy === 0){
    const headY = player.y;
    const headProbe = {x:player.x+2, y:headY-2, width:player.width-4, height:4};
    powerupBoxes.forEach(b=>{
      if(b.used) return;
      if(rectsOverlap(headProbe, b)){
        b.used=true; sfxBreak(); shake(2);
        const roll=Math.random();
        let ptype;
        if(roll<0.30){
          // 30% chance: coin burst
          for(let ci=0;ci<5;ci++) coins.push({x:b.x+TILE/2-6+ci*2,y:b.y-TILE*0.5,w:12,h:12,dy:-4-Math.random()*3,alive:true,isCoin:true,_startY:b.y-TILE*0.5});
          sfxCoin(); spawnFloat(~~(b.x+8-CAM.x),b.y-10,'+500','#ffcc00'); score+=500; updateHUD();
          spawnParticles(b.x+16-CAM.x,b.y,'#ffcc00',8,3);
          return;
        } else if(roll<0.70){ ptype='big'; }   // 40%
        else if(roll<0.90){ ptype='fire'; }     // 20%
        else { ptype='star'; }                  // 10%
        powerupsOnGround.push({x:b.x+4,y:b.y-TILE,w:20,h:20,type:ptype,dy:-3,alive:true});
        spawnParticles(b.x+16-CAM.x,b.y,'#ffcc00',8,3);
      }
    });
  }

  if(player.grounded&&player.state!=='jump'){
    player.state=Math.abs(player.dx)>0.5?'walk':'idle';
  }
  if(!player.grounded&&player.dy!==0)player.state='jump';

  // Animate — animTimer increments freely, frame selection done in drawPlayer
  player.animTimer++;

  // Moving platforms update (level 3 + 4)
  if(levelIdx===2||levelIdx===3){
    movingPlatforms.forEach((mp,mpIdx)=>{
      const onPlatform = player.grounded &&
        player.x+player.width > mp.x && player.x < mp.x+mp.w &&
        Math.abs((player.y+player.height) - mp.y) < 6;

      if(mp.dx !== 0){
        // Improvement 5: pendulum pair (indices 1,2) use sin-wave for smooth oscillation
        let newX;
        if(mpIdx===1||mpIdx===2){
          const phase = mpIdx===1 ? 0 : Math.PI; // opposite phase = pendulum
          const amp   = (mp.maxX - mp.minX)/2;
          const cx    = mp.minX + amp;
          newX = cx + Math.sin(FC * 0.03 + phase) * amp;
        } else {
          newX = mp.x + mp.dx;
          if(newX < mp.minX){ newX = mp.minX; mp.dx *= -1; }
          if(newX+mp.w > mp.maxX){ newX = mp.maxX-mp.w; mp.dx *= -1; }
        }
        if(onPlatform) player.x += (newX - mp.x);
        mp.x = newX;
      }
      if(mp.dy !== 0){
        mp.y += mp.dy;
        if(mp.y < mp.minY){ mp.y = mp.minY; mp.dy *= -1; }
        if(mp.y > mp.maxY){ mp.y = mp.maxY; mp.dy *= -1; }
        if(onPlatform) player.y += mp.dy;
      }
    });

    // Star blocks — disappear after being stepped on
    starBlocks.forEach(sb=>{
      if(!sb.alive) return;
      const onBlock = player.grounded &&
        player.x+player.width > sb.x && player.x < sb.x+sb.w &&
        Math.abs((player.y+player.height) - sb.y) < 6;
      if(sb.state==='solid' && onBlock){
        sb.state='shaking'; sb.timer=0;
      }
      if(sb.state==='shaking'){
        sb.timer++;
        if(sb.timer >= sb.delay){ sb.state='gone'; sb.alive=false;
          spawnParticles(~~(sb.x+sb.w/2-CAM.x), sb.y, '#ffdd44', 8, 3);
        }
      }
    });
  }

  // Wind zones — push player if inside zone
  if((levelIdx===1||levelIdx===2||levelIdx===3) && !player.dead && windZones.length){
    windZones.forEach(wz=>{
      if(player.y+player.height>wz.y1 && player.y<wz.y2){
        player.dx+=wz.force*0.06;
        // Visual — tiny wind particles
        if(FC%5===0) spawnParticles(player.x+(wz.force>0?-10:player.width+10),
          player.y+player.height/2,'#aaccff',2,1);
      }
    });
  }
  // Breakable ice blocks — smash if enough momentum
  if(levelIdx===1 && !player.dead){
    const speed=Math.sqrt(player.dx*player.dx+player.dy*player.dy);
    breakables.forEach(b=>{
      if(!b.alive) return;
      const pr={x:player.x,y:player.y,width:player.width,height:player.height};
      const br={x:b.x,y:b.y,width:b.w,height:b.h};
      if(rectsOverlap(pr,br)){
        if(speed>5.5){ // needs high momentum to smash
          b.alive=false;
          // Remove from tiles
          const ti=tiles.findIndex(t=>t.type==='breakice' && t.x===b.x && t.y===b.y);
          if(ti!==-1) tiles.splice(ti,1);
          sfxBreak(); shake(3);
          spawnParticles(b.x+TILE/2-CAM.x, b.y+TILE/2, '#88ccff', 16, 4);
          score+=200; updateHUD();
        } else if(!b.cracked && speed>3){
          b.cracked=true; // show cracks
          spawnParticles(b.x+TILE/2-CAM.x, b.y+TILE/2, '#aaddff', 6, 2);
        }
      }
    });
  }
  // Momentum switches — activate if player steps on with speed
  if(levelIdx===1 && !player.dead){
    switches.forEach(sw=>{
      if(sw.activated) return;
      const sr={x:sw.x,y:sw.y,width:sw.w,height:sw.h};
      if(player.grounded && rectsOverlap({x:player.x,y:player.y,width:player.width,height:player.height},sr)){
        if(Math.abs(player.dx)>3){
          sw.activated=true;
          sw.platform.visible=true;
          // Add platform to tiles
          const p=sw.platform;
          tiles.push({x:p.x,y:p.y,w:p.w,h:p.h,width:p.w,height:p.h,type:'ice'});
          sfxPowerup(); shake(2);
          spawnParticles(sw.x+sw.w/2-CAM.x, sw.y, '#ffdd00', 12, 3);
        }
      }
    });
  }

  // Lava — Level 2 only: die if Mario's Y reaches lava row (row 13 = y 468)
  // Star = fully immune, no bounce, just skip the check entirely
  if(!player.dead && levelIdx===1 && player.powerup!=='star'){
    const LAVA_Y = 13 * TILE;
    if(player.y >= LAVA_Y){
      player.powerup=null;
      player.invincible=0;
      player.dead=true;
      player.deadTimer=0;
      player.dy=-9;
      sfxDie(); shake(6);
      spawnParticles(player.x+10,player.y+14,'#ff4444',20,5);
    }
  }
  // Level 3: die when falling below the bottom of the level
  if(levelIdx===2 && player.y > 44*TILE+10 && !player.dead){
    killPlayer();
  } else if(levelIdx!==2 && player.y > levelData.map.length*TILE + 100) killPlayer();

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(e.stomped){
      e.stompTimer++;
      if(e.stompTimer>18)e.alive=false;
      return;
    }
    if(e.type==='flyer'){
      e.x+=e.dx;
      e.y=e.flyY+Math.sin(FC*0.05+e.startX*0.01)*24;
      if(e.x<e.startX-80||e.x>e.startX+80)e.dx*=-1;
    } else {
      e.dy=Math.min(e.dy+GRAVITY,MAX_FALL);
      // Edge detection — reverse before walking off platform
      if(e.grounded && e.type!=='flyer'){
        const aheadX = e.dx>0 ? e.x+e.width+2 : e.x-2;
        const belowY  = e.y+e.height+4;
        const hasGround = tiles.some(t=>t.type!=='lava'&&t.type!=='coin'&&
          aheadX>=t.x&&aheadX<=t.x+t.w&&belowY>=t.y&&belowY<=t.y+t.h);
        if(!hasGround) e.dx=-e.dx;
      }
      e.x+=e.dx;e.y+=e.dy;
      resolveVsTiles(e,tiles,true);
      // Turn at patrol boundaries
      if(e.x<=e.minX){e.x=e.minX;e.dx=Math.abs(e.dx);}
      if(e.x>=e.maxX){e.x=e.maxX;e.dx=-Math.abs(e.dx);}
    }
    e.animTimer++;if(e.animTimer%10===0)e.frame=(e.frame+1)%2;

    // Player vs enemy
    if(player.invincible===0&&rectsOverlap(player,{x:e.x,y:e.y,width:e.width,height:e.height})){
      if(player.powerup==='star'){
        // Star kills instantly
        e.stomped=true;
        score+=500;
        spawnParticles(e.x+12-CAM.x,e.y+12-CAM.y,'#ffff00',14,4);
        spawnFloat(e.x-CAM.x,e.y-CAM.y-10,'+500','#ff0');
        shake(2);updateHUD();
      } else if(player.dy>0&&player.y+player.height<e.y+e.height/2+12){
        // Stomp
        e.health--;
        if(e.type==='koopa'&&e.health>0){
          e.stomped=false;e.stompTimer=0;// just flatten
          player.dy=-7;
        } else {
          e.stomped=true;player.dy=-7;
        }
        score+=200;
        sfxStomp();shake(2);
        spawnParticles(e.x+12-CAM.x,e.y+12-CAM.y,'#ff8844',10,3);
        spawnFloat(e.x-CAM.x,e.y-CAM.y-10,'+200','#f84');
        updateHUD();
      } else {
        killPlayer();
      }
    }

    // Fireballs vs enemy
    fireballs.forEach(fb=>{
      if(!fb.alive)return;
      if(rectsOverlap(fb,{x:e.x,y:e.y,width:e.width,height:e.height})){
        fb.alive=false;e.stomped=true;
        score+=100;spawnFloat(e.x-CAM.x,e.y-10,'+100','#f80');
        spawnParticles(e.x+12,e.y,'#ff8800',8,3);
        updateHUD();
      }
    });
  });

  // Coins
  coins.forEach(c=>{
    if(c.collected)return;
    if(c.isCoin){
      c.dy=Math.min((c.dy||0)+GRAVITY*0.5, 8);
      c.y+=c.dy;
      if(c.dy>0 && c.y>c._startY+(TILE*2)) c.collected=true;
    }
    if(rectsOverlap(player,{x:c.x,y:c.y,width:16,height:16})){
      c.collected=true;coinCount++;score+=100;
      sfxCoin();
      spawnParticles(c.x+8-CAM.x,c.y+8,'#ffd700',6,3);
      spawnFloat(c.x-CAM.x,c.y,'+100','#ffd700');
      updateHUD();
    }
  });

  // Powerup boxes
  // Q box hit handled in resolveVsTiles head-bump check above

  // Powerups on ground
  powerupsOnGround.forEach(p=>{
    if(!p.alive)return;
    p.dy=Math.min(p.dy+GRAVITY,8);
    p.y+=p.dy;p.x+=0.8;// drift right
    // resolve vs tiles (vertical only)
    for(const t of tiles){
      if(!rectsOverlap(p,t))continue;
      const oy=Math.min(p.y+p.h,t.y+t.h)-Math.max(p.y,t.y);
      if(p.dy>=0){p.y=t.y-p.h;p.dy=0;}
    }
    if(rectsOverlap(player,{x:p.x,y:p.y,width:p.w,height:p.h})){
      p.alive=false;
      sfxPowerup();
      const old=player.powerup;
      if(p.type==='star'){player.powerup='star';player.powerupTimer=1800;}
      else if(p.type==='fire'){player.powerup='fire';}
      else{player.powerup='big';}
      if(old!==player.powerup){player.width=20;player.height=player.powerup==='big'?36:28;}
      score+=500;spawnFloat(~~(player.x-CAM.x),player.y-10,'POWER UP!','#ff8800');
      updateHUD();
    }
  });

  // Fireballs
  fireballs=fireballs.filter(fb=>fb.alive&&fb.x>CAM.x-20&&fb.x<CAM.x+W+20&&fb.bounces<5);
  fireballs.forEach(fb=>{
    fb.dy=Math.min(fb.dy+GRAVITY*0.8,10);
    fb.x+=fb.dx;fb.y+=fb.dy;
    for(const t of tiles){
      if(rectsOverlap(fb,t)){
        if(fb.dy>0){fb.dy=-7;fb.bounces++;spawnParticles(fb.x,fb.y,'#ff8800',3,2);}
        else{fb.alive=false;}
      }
    }
  });

  // Fire attack
  if((just['KeyF']||just['KeyC'])&&player.powerup==='fire'){
    fireballs.push({x:player.x+(player.facing===1?player.width:0),y:player.y+10,
      width:10,height:10,dx:player.facing*7,dy:-2,alive:true,bounces:0});
    player.throwingFire=true; player.throwTimer=12;
    delete just['KeyF'];delete just['KeyC'];
    beep(800,0.05,'square',0.1);
  }
  if(player.throwingFire){player.throwTimer--;if(player.throwTimer<=0){player.throwingFire=false;player.throwTimer=0;}}

  // Piranha plants
  piranhas.forEach(p=>{
    if(!p.alive)return;
    p.timer++;
    const RISE=80,OUT=120,LOWER=80,HIDE=140; // frame counts per state
    if(p.state==='hiding'){
      p.offset=0;
      if(p.timer>HIDE){p.timer=0;p.state='rising';}
    } else if(p.state==='rising'){
      p.offset=-p.h*(p.timer/RISE);
      if(p.timer>=RISE){p.offset=-p.h;p.timer=0;p.state='out';}
    } else if(p.state==='out'){
      p.offset=-p.h;
      if(p.timer>OUT){p.timer=0;p.state='lowering';}
    } else if(p.state==='lowering'){
      p.offset=-p.h*(1-p.timer/LOWER);
      if(p.timer>=LOWER){p.offset=0;p.timer=0;p.state='hiding';}
    }
    // Kill player on contact (but not when hiding completely)
    if(p.state!=='hiding'&&p.offset<-4){
      const ph={x:p.x+4,y:p.pipeTopY+p.offset,width:p.w-8,height:p.h};
      if(player.invincible===0&&rectsOverlap(player,ph)){
        if(player.powerup==='star'){p.alive=false;score+=300;spawnFloat(p.x-CAM.x,p.pipeTopY-20,'+300','#0f0');}
        else killPlayer();
      }
      // Fireballs kill piranha
      fireballs.forEach(fb=>{
        if(!fb.alive)return;
        if(rectsOverlap(fb,ph)){fb.alive=false;p.alive=false;score+=200;spawnFloat(p.x-CAM.x,p.pipeTopY-20,'+200','#f80');spawnParticles(p.x+16-CAM.x,p.pipeTopY+p.offset,'#22dd44',10,3);updateHUD();}
      });
    }
  });

  // Portal (level exit)
  if(portalX!==null){
    const portal={x:portalX,y:portalY-TILE*2,width:TILE,height:TILE*3};
    if(rectsOverlap(player,portal)){
      triggerWin();
    }
  }

  // Legacy goal fallback (no portal defined)
  if(portalX===null){
    const gx=(levelData.width-5)*TILE;
    if(player.x+player.width>gx&&player.x<gx+TILE*2) triggerWin();
  }

  updateCamera(player,levelW);
  updateHUD();
}

function triggerWin(){
  gameRunning=false;
  sfxWin();
  score+=1000*(levelIdx+1);
  // Big celebration
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      spawnParticles(Math.random()*W,Math.random()*H,'#ffd700',15,5);
      spawnParticles(Math.random()*W,Math.random()*H,'#44ff88',15,5);
      spawnParticles(Math.random()*W,Math.random()*H,'#ff4488',15,5);
    },i*120);
  }
  updateHUD();
  setTimeout(()=>{
    levelIdx++;
    if(levelIdx>=LEVELS.length){showVictory();}
    else{
      showLevelTransition(LEVELS[levelIdx].name,()=>{
        buildLevel(levelIdx);gameRunning=true;
      });
    }
  },1200);
}

// ═══════════════════════════════════════════════════════════════
// LEVEL 3 CLIMB GUIDE
// ═══════════════════════════════════════════════════════════════
function drawClimbGuide(){
  const pulse = 0.55 + Math.abs(Math.sin(FC * 0.07)) * 0.45;
  ctx.save();
  ctx.imageSmoothingEnabled = false;

  // ── Top HUD arrow: always shown, points up, shows portal direction ──
  const portalScreenY = portalY - CAM.y;
  const arrowDir = portalScreenY < H/2 ? -1 : 1; // -1=up, 1=down (portal above or below)

  // Draw big UP arrow at top-centre of screen
  const ax = W/2, ay = 28;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffee55';
  // Arrow triangle
  ctx.beginPath();
  ctx.moveTo(ax,       ay - 14);
  ctx.lineTo(ax + 12,  ay + 2);
  ctx.lineTo(ax + 5,   ay + 2);
  ctx.lineTo(ax + 5,   ay + 14);
  ctx.lineTo(ax - 5,   ay + 14);
  ctx.lineTo(ax - 5,   ay + 2);
  ctx.lineTo(ax - 12,  ay + 2);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = pulse * 0.9;
  ctx.strokeStyle = '#cc8800';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // "CLIMB!" label
  ctx.globalAlpha = pulse;
  ctx.font = "bold 10px 'Press Start 2P', monospace";
  ctx.fillStyle = '#ffee55';
  ctx.textAlign = 'center';
  ctx.fillText('CLIMB!', ax, ay + 28);

  // Speed bar — shows RUN vs WALK, reminds player to hold SHIFT for momentum gates
  const spd = Math.abs(player.dx);
  const maxSpd = 3.8;
  const barW = 60, barH = 6;
  const bx = W - barW - 12, by = H - 22;
  ctx.globalAlpha = 0.8;
  ctx.fillStyle = '#222244'; ctx.fillRect(bx, by, barW, barH);
  const pct = Math.min(spd / maxSpd, 1);
  const speedCol = spd >= 3.5 ? '#ff8800' : spd >= 2.5 ? '#ffcc00' : '#4488ff';
  ctx.fillStyle = speedCol; ctx.fillRect(bx, by, ~~(barW * pct), barH);
  ctx.strokeStyle = '#aaaaff'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, barW, barH);
  ctx.fillStyle = '#aaaaff'; ctx.globalAlpha = 0.7;
  ctx.font = "6px 'Press Start 2P', monospace";
  ctx.fillText(spd>=3.5?'RUN!':spd>=2.5?'fast':'walk', bx - 34, by + 6);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  // ── Portal distance indicator (right side) ──
  const distTiles = Math.max(0, Math.floor((player.y - portalY) / TILE));
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#aaaaff';
  ctx.font = "8px 'Press Start 2P', monospace";
  ctx.textAlign = 'right';
  ctx.fillText('↑ ' + distTiles + ' up', W - 12, 20);
  ctx.textAlign = 'left';

  // ── World-space arrows: small arrows on platforms above player ──
  // Show arrows on platforms within 3–10 tiles above Mario
  const playerMidX = player.x + player.width/2;
  const playerTopY = player.y;

  tiles.forEach(t => {
    if(t.type !== 'brick' && t.type !== 'ground') return;
    const tScreenX = t.x - CAM.x;
    const tScreenY = t.y - CAM.y;
    // Only show arrows for platforms that are:
    // above the player (smaller y = higher up), within 5 tiles vertically, on screen
    const dy = playerTopY - t.y; // positive = tile is above player
    if(dy < TILE || dy > TILE * 6) return;
    if(tScreenY < -TILE || tScreenY > H) return;
    if(tScreenX < -TILE || tScreenX > W) return;

    // Draw small arrow above the platform
    const cx = tScreenX + t.w/2;
    const cy = tScreenY - 10;
    const a = 0.4 + Math.abs(Math.sin(FC * 0.08 + t.x * 0.01)) * 0.5;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#88ffcc';
    ctx.beginPath();
    ctx.moveTo(cx,     cy - 7);
    ctx.lineTo(cx + 6, cy + 1);
    ctx.lineTo(cx + 3, cy + 1);
    ctx.lineTo(cx + 3, cy + 7);
    ctx.lineTo(cx - 3, cy + 7);
    ctx.lineTo(cx - 3, cy + 1);
    ctx.lineTo(cx - 6, cy + 1);
    ctx.closePath();
    ctx.fill();
  });

  // ── Moving platform arrows ──
  movingPlatforms.forEach(mp => {
    const tScreenX = mp.x - CAM.x;
    const tScreenY = mp.y - CAM.y;
    const dy = playerTopY - mp.y;
    if(dy < TILE || dy > TILE * 6) return;
    if(tScreenY < -TILE || tScreenY > H) return;
    const cx = tScreenX + mp.w/2;
    const cy = tScreenY - 10;
    const a = 0.5 + Math.abs(Math.sin(FC * 0.1 + mp.x * 0.01)) * 0.45;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#cc88ff'; // purple for moving platforms
    ctx.beginPath();
    ctx.moveTo(cx,     cy - 7);
    ctx.lineTo(cx + 6, cy + 1);
    ctx.lineTo(cx + 3, cy + 1);
    ctx.lineTo(cx + 3, cy + 7);
    ctx.lineTo(cx - 3, cy + 7);
    ctx.lineTo(cx - 3, cy + 1);
    ctx.lineTo(cx - 6, cy + 1);
    ctx.closePath();
    ctx.fill();
  });

  // Leap-of-faith: if nearest coin is off-screen above, show faint guide star
  let nearestCoinY = Infinity;
  let nearestCoinX = W/2;
  for(const c of coins){
    if(!c.collected && c.y < CAM.y - 10){
      if(c.y < nearestCoinY){ nearestCoinY=c.y; nearestCoinX=c.x-CAM.x; }
    }
  }
  if(nearestCoinY < Infinity){
    const gx = Math.max(10, Math.min(W-10, nearestCoinX));
    ctx.globalAlpha = 0.5 + Math.sin(FC*0.12)*0.3;
    ctx.fillStyle = '#ffd700';
    ctx.font = "14px monospace";
    ctx.textAlign = 'center';
    ctx.fillText('★', gx, 14);
    ctx.globalAlpha = 1; ctx.textAlign = 'left';
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════════
function draw(){
  const sx=~~(screenShake>0.5?Math.sin(FC*2)*screenShake:0);
  const sy=~~(screenShake>0.5?Math.cos(FC*1.7)*screenShake*0.5:0);
  ctx.save();ctx.translate(sx,sy);

  // Sky
  const [c1,c2]=levelData.bg;
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Level 3: bottomless void at bottom
  if(levelIdx===1){
    const voidY=~~(levelData.map.length*TILE-CAM.y-TILE*2);
    if(voidY<H){
      const vg=ctx.createLinearGradient(0,Math.max(0,voidY),0,H);
      vg.addColorStop(0,'rgba(0,0,0,0)');
      vg.addColorStop(0.4,'rgba(0,0,8,0.95)');
      vg.addColorStop(1,'#000000');
      ctx.fillStyle=vg;ctx.fillRect(0,Math.max(0,voidY),W,H);
    }
  }
  // Level 4: snowy mountain background scenery
  if(levelIdx===3){
    // Distant mountains
    ctx.fillStyle='#cce0f0';
    const mts=[{x:0,h:180},{x:120,h:220},{x:260,h:160},{x:380,h:200},{x:500,h:180},{x:640,h:210},{x:780,h:170},{x:900,h:200}];
    mts.forEach(m=>{
      const mx=m.x-(CAM.x*0.15)%W;
      ctx.beginPath();ctx.moveTo(mx,H);ctx.lineTo(mx+80,H-m.h);ctx.lineTo(mx+160,H);ctx.fill();
      // Snow cap
      ctx.fillStyle='#f0f8ff';
      ctx.beginPath();ctx.moveTo(mx+80,H-m.h);ctx.lineTo(mx+55,H-m.h+60);ctx.lineTo(mx+105,H-m.h+60);ctx.closePath();ctx.fill();
      ctx.fillStyle='#cce0f0';
    });
    // Falling snowflakes
    for(let i=0;i<40;i++){
      const sx2=((i*137+FC*0.8)%(levelW*TILE));
      const sy2=((i*97 +FC*1.2)%(H+20))-10;
      const ss=1+(i%3);
      ctx.fillStyle='rgba(220,240,255,0.8)';
      ctx.fillRect(~~(sx2-CAM.x),~~sy2,ss,ss);
    }
  }

  // Clouds (back to front)
  [2,1,0].forEach(layer=>{
    clouds.filter(c=>c.layer===layer).forEach(cl=>{
      ctx.globalAlpha=0.3+layer*0.25;
      drawCloud(cl.x+(cl.x-CAM.x*0.3*(1-layer*0.3)),cl.y,cl.w);
    });
  });
  ctx.globalAlpha=1;

  // Tiles
  tiles.forEach(t=>{
    const tx=~~(t.x-CAM.x),ty=~~(t.y-CAM.y);
    if(tx<-TILE-2||tx>W+2)return;
    if(ty<-TILE-2||ty>H+2)return;
    if(t.type==='ground'){
      ctx.drawImage(TILE_CACHE.ground,tx,ty);
    }
    else if(t.type==='brick'){
      if(levelIdx===2){ // cosmic brick for sky level
        ctx.fillStyle='#1a1060'; ctx.fillRect(tx,ty,TILE,TILE);
        ctx.fillStyle='#2a1a80'; ctx.fillRect(tx,ty,TILE,4);
        ctx.fillStyle='#3a2a99'; ctx.fillRect(tx+2,ty+1,8,2);
        ctx.fillStyle='#0d0840'; ctx.fillRect(tx,ty+TILE-3,TILE,3);
        // star speckles
        if((tx+ty)%72===0){ctx.fillStyle='#8866ff';ctx.fillRect(tx+6,ty+8,2,2);}
        if((tx+ty)%48===0){ctx.fillStyle='#aaaaff';ctx.fillRect(tx+22,ty+16,2,2);}
      }
      else if(levelIdx===3){ // snow platform for ski level
        ctx.fillStyle='#d8eef8'; ctx.fillRect(tx,ty,TILE,TILE);
        ctx.fillStyle='#f0f8ff'; ctx.fillRect(tx,ty,TILE,6);
        ctx.fillStyle='#ffffff'; ctx.fillRect(tx+2,ty+1,8,3);
        ctx.fillStyle='#b8d4e8'; ctx.fillRect(tx,ty+TILE-4,TILE,4);
        ctx.fillStyle='#a0c0d8'; ctx.fillRect(tx,ty+6,2,TILE-10);
      }
      else ctx.drawImage(TILE_CACHE.brick,tx,ty);
    }
    // breakice drawn separately in L3 draw block
    else if(t.type==='ice'){
      if(levelIdx===3){ // packed snow/ice for ski slope floor
        ctx.fillStyle='#c8e4f4'; ctx.fillRect(tx,ty,TILE,TILE);
        ctx.fillStyle='#e8f6ff'; ctx.fillRect(tx,ty,TILE,5);
        ctx.fillStyle='#ffffff'; ctx.fillRect(tx+3,ty+1,6,2);
        ctx.fillStyle='#ffffff'; ctx.fillRect(tx+TILE-10,ty+1,5,2);
        ctx.fillStyle='#a8ccdc'; ctx.fillRect(tx,ty+TILE-3,TILE,3);
        // ice shimmer
        if((tx+ty)%54===0){ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fillRect(tx+8,ty+8,4,4);}
        if((tx+ty)%38===0){ctx.fillStyle='rgba(200,230,255,0.5)';ctx.fillRect(tx+20,ty+14,3,3);}
      } else {
        ctx.drawImage(TILE_CACHE.ice,tx,ty);
      }
    }
    else if(t.type==='lava')drawLavaTile(tx,ty);
    else if(t.type==='pipe_top')ctx.drawImage(TILE_CACHE.pipe_top,tx,ty);
    else if(t.type==='pipe_body')ctx.drawImage(TILE_CACHE.pipe_body,tx,ty);
  });

  // (portal drawn separately above, goal flag removed)

  // Powerup boxes
  powerupBoxes.forEach(b=>drawPowerupBox(b.x,b.y-CAM.y,b.used));

  // Powerups on ground
  powerupsOnGround.forEach(p=>{
    if(!p.alive)return;
    if(p.type==='big'||p.type==='random')drawMushroom(p.x,p.y-CAM.y);
    else if(p.type==='fire')drawFireFlower(p.x,p.y-CAM.y);
    else if(p.type==='star')drawStar(p.x,p.y-CAM.y);
  });

  // Coins
  coins.forEach(c=>{if(!c.collected)drawCoin(c.x,c.y-CAM.y);});

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive)return;
    const ex=~~(e.x-CAM.x);if(ex<-40||ex>W+40)return;
    if(e.type==='goomba')drawGoomba(e);
    else if(e.type==='koopa')drawKoopa(e);
    else if(e.type==='spike')drawSpike(e);
    else if(e.type==='flyer')drawFlyer(e);
  });


  // Icicles / wind / breakables (level 3 + ski level 4)
  if(levelIdx===1||levelIdx===3){
    icicles.forEach(ic=>{
      if(!ic.alive) return;
      const sx=~~(ic.x-CAM.x)+(ic.state==='shaking'?~~(Math.sin(FC*1.8)*2):0);
      const sy=~~(ic.y-CAM.y);
      ctx.fillStyle='#88ddff';
      ctx.beginPath();ctx.moveTo(sx+ic.w/2,sy+ic.h);ctx.lineTo(sx,sy);ctx.lineTo(sx+ic.w,sy);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ccf4ff';
      ctx.beginPath();ctx.moveTo(sx+ic.w/2,sy+ic.h);ctx.lineTo(sx+3,sy);ctx.lineTo(sx+ic.w*0.4,sy);ctx.closePath();ctx.fill();
    });

    // Breakable ice blocks
    breakables.forEach(b=>{
      if(!b.alive) return;
      const bx=~~(b.x-CAM.x), by=~~(b.y-CAM.y);
      if(bx<-TILE||bx>W) return;
      rect(bx,by,TILE,TILE,'#7ec8f0');
      rect(bx,by,TILE,3,'#b0e4ff');
      rect(bx+2,by+1,6,1,'#ffffff');
      if(b.cracked){
        // crack lines
        ctx.strokeStyle='#2266aa'; ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(bx+8,by+2);ctx.lineTo(bx+4,by+TILE-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(bx+20,by+5);ctx.lineTo(bx+26,by+TILE-2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(bx+14,by+3);ctx.lineTo(bx+10,by+TILE/2);ctx.lineTo(bx+18,by+TILE-5);ctx.stroke();
      } else {
        rect(bx+4,by+6,3,3,'rgba(255,255,255,0.7)');
        rect(bx+TILE-10,by+TILE-10,4,4,'rgba(150,200,255,0.5)');
      }
    });

    // Wind zone visual — wavy lines
    windZones.forEach(wz=>{
      const wy1=~~(wz.y1-CAM.y), wy2=~~(wz.y2-CAM.y);
      if(wy2<0||wy1>H) return;
      if(levelIdx===3){
        // Ski level: draw horizontal snow streaks instead of blue tint
        ctx.globalAlpha=0.35;
        for(let i=0;i<18;i++){
          const streakY=((i*53+FC*2*(wz.force>0?1:-1))%H+H)%H;
          const streakX=((i*137+FC*3*(wz.force>0?1:-1))%(W+200))-100;
          const len=30+((i*17)%40);
          ctx.fillStyle='rgba(220,240,255,0.9)';
          ctx.fillRect(~~streakX,~~streakY,len,1);
        }
        ctx.globalAlpha=1;
      } else {
        ctx.globalAlpha=0.08+Math.abs(Math.sin(FC*0.04))*0.06;
        ctx.fillStyle=wz.force<0?'#4488cc':'#44aacc';
        ctx.fillRect(0,wy1,W,wy2-wy1);
        ctx.globalAlpha=1;
        // Wind arrow hints
        if(FC%20<10){
          const dir=wz.force<0?-1:1;
          for(let wx=40;wx<W-40;wx+=80){
            const wy=~~((wy1+wy2)/2);
            ctx.fillStyle='rgba(150,210,255,0.4)';
            ctx.beginPath();
            ctx.moveTo(wx,wy);ctx.lineTo(wx+dir*12,wy-4);ctx.lineTo(wx+dir*12,wy+4);ctx.closePath();ctx.fill();
          }
        }
      }
    });

    // Momentum switches
    switches.forEach(sw=>{
      const sx=~~(sw.x-CAM.x), sy=~~(sw.y-CAM.y);
      if(sx<-TILE*3||sx>W) return;
      // Switch plate
      rect(sx,sy,sw.w,sw.h,sw.activated?'#ffdd00':'#446688');
      rect(sx,sy,sw.w,4,sw.activated?'#fff':'#88aabb');
      ctx.fillStyle='#fff';
      ctx.font='bold 7px monospace';
      ctx.textAlign='center';
      ctx.fillText(sw.activated?'✓':'SPD',sx+sw.w/2,sy+sw.h-4);
      ctx.textAlign='left';
      // Target platform if visible
      if(sw.platform.visible){
        const px=~~(sw.platform.x-CAM.x), py=~~(sw.platform.y-CAM.y);
        if(px>-TILE*8&&px<W+TILE*8){
          for(let i=0;i<sw.platform.w;i+=TILE) drawIceBrick(px+i,py);
        }
      }
    });
  }


  // Level 3 + 4: moving platforms and star blocks
  if(levelIdx===2||levelIdx===3){
    // Moving cloud/lift platforms
    movingPlatforms.forEach(mp=>{
      const px=~~(mp.x-CAM.x), py=~~(mp.y-CAM.y);
      if(px>W+mp.w||px+mp.w<-10||py>H||py+36<-10) return;
      if(mp.type==='lift'){
        // Glowing lift platform — gold/purple
        ctx.fillStyle='#9944ff'; ctx.fillRect(px,py,mp.w,mp.h);
        ctx.fillStyle='#cc88ff'; ctx.fillRect(px,py,mp.w,4);
        ctx.fillStyle='#ffdd44'; ctx.fillRect(px+2,py+1,8,2);
        // Glow effect
        ctx.globalAlpha=0.25+Math.abs(Math.sin(FC*0.05))*0.2;
        ctx.fillStyle='#cc88ff'; ctx.fillRect(px-2,py-2,mp.w+4,mp.h+4);
        ctx.globalAlpha=1;
      } else {
        // Cloud platform — white/light blue
        ctx.fillStyle='#ddeeff'; ctx.fillRect(px,py,mp.w,mp.h);
        ctx.fillStyle='#ffffff'; ctx.fillRect(px+4,py,mp.w-8,8);
        ctx.fillStyle='#aaccee'; ctx.fillRect(px,py+mp.h-6,mp.w,6);
        // Soft glow
        ctx.globalAlpha=0.15;
        ctx.fillStyle='#88ccff'; ctx.fillRect(px-4,py-4,mp.w+8,mp.h+8);
        ctx.globalAlpha=1;
      }
    });

    // Disappearing star blocks
    starBlocks.forEach(sb=>{
      if(!sb.alive) return;
      const bx=~~(sb.x-CAM.x), by=~~(sb.y-CAM.y);
      if(bx>W||bx+sb.w<0||by>H||by+sb.h<0) return;
      const shake = sb.state==='shaking' ? ~~(Math.sin(FC*1.5)*2) : 0;
      // Flash when shaking
      const flash = sb.state==='shaking' && FC%6<3;
      const isCrumble = sb.crumble;
      ctx.fillStyle = flash ? '#ffffff' : (isCrumble ? '#cc4400' : '#ffdd00');
      ctx.fillRect(bx+shake,by,sb.w,sb.h);
      ctx.fillStyle='#ffaa00'; ctx.fillRect(bx+shake,by,sb.w,4);
      // Star shape overlay
      ctx.fillStyle='#fff176';
      ctx.fillRect(bx+shake+14,by+4,8,24); // vertical
      ctx.fillRect(bx+shake+4,by+12,28,8); // horizontal
      ctx.fillRect(bx+shake+8,by+6,4,4);   // corner sparks
      ctx.fillRect(bx+shake+24,by+6,4,4);
      ctx.fillRect(bx+shake+8,by+26,4,4);
      ctx.fillRect(bx+shake+24,by+26,4,4);
      // Timer bar when shaking
      if(sb.state==='shaking'){
        const pct = 1-(sb.timer/sb.delay);
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by-6,sb.w,4);
        ctx.fillStyle='#ffdd00'; ctx.fillRect(bx,by-6,~~(sb.w*pct),4);
      }
    });
  }

  // Piranha plants (drawn on top of pipes)
  piranhas.forEach(p=>{
    if(!p.alive||p.state==='hiding'||p.offset===0)return;
    const px=~~(p.x-CAM.x), py=~~(p.pipeTopY+p.offset-CAM.y);
    const pw=~~p.w, ph=~~p.h;
    // Stem
    rect(px+pw/2-4,py+ph*0.4,8,ph*0.6,'#1a7a1a');
    rect(px+pw/2-3,py+ph*0.4,4,ph*0.6,'#2aaa2a');
    // Head (venus flytrap style)
    const bob=Math.sin(FC*0.12)*2;
    rect(px+2,py+bob,pw-4,ph*0.5,'#dd2222');
    rect(px+4,py+2+bob,pw-8,ph*0.4,'#ff4444');
    // White teeth dots
    for(let i=0;i<4;i++){rect(px+4+i*7,py+ph*0.38+bob,4,6,'#fff');}
    // Eye dots
    rect(px+7,py+6+bob,4,4,'#fff');rect(px+pw-11,py+6+bob,4,4,'#fff');
    rect(px+8,py+7+bob,2,2,'#000');rect(px+pw-10,py+7+bob,2,2,'#000');
    // Spots on head
    rect(px+6,py+14+bob,5,5,'#ff6666');rect(px+pw-11,py+14+bob,5,5,'#ff6666');
  });

  // Portal — swirling vortex
  if(portalX!==null){
    const px=~~(portalX-CAM.x), py=~~(portalY-TILE*2-CAM.y);
    const t=FC*0.05;
    // Outer ring
    ctx.save();
    ctx.translate(px+TILE/2, py+TILE*1.5);
    for(let i=0;i<12;i++){
      const a=i/12*Math.PI*2+t*2;
      const r=22+Math.sin(t*3+i)*4;
      const hue=(i/12*360+FC*3)%360;
      ctx.fillStyle=`hsl(${hue},100%,60%)`;
      ctx.fillRect(Math.cos(a)*r-3,Math.sin(a)*r-3,6,6);
    }
    // Middle rings
    for(let i=0;i<8;i++){
      const a=i/8*Math.PI*2-t*3;
      ctx.fillStyle=`hsl(${(i*45+FC*5)%360},100%,80%)`;
      ctx.fillRect(Math.cos(a)*13-2,Math.sin(a)*13-2,4,4);
    }
    // Core
    const pulse=0.8+Math.sin(FC*0.15)*0.2;
    ctx.fillStyle='#ffffff';
    ctx.globalAlpha=pulse;
    ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.6;
    ctx.fillStyle='#aaeeff';
    ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
    // Label
    ctx.font='6px monospace';ctx.fillStyle='#fff';
    ctx.globalAlpha=0.8+Math.sin(FC*0.1)*0.2;
    ctx.fillText('NEXT',px+TILE/2-10,py-4);
    ctx.globalAlpha=1;
  }

  // Fireballs
  fireballs.forEach(fb=>{if(fb.alive)drawFireball(fb);});

  // Player
  if(!player.dead||(player.dead&&player.deadTimer<50))
    drawPlayer(player);

  // Particles
  drawParticles();

  ctx.restore();

  // Star timer HUD
  drawStarTimer();

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  // Level 3: directional guide arrows
  if(levelIdx===2 && player && !player.dead){
    drawClimbGuide();
  }
}

// ═══════════════════════════════════════════════════════════════
// OVERLAYS
// ═══════════════════════════════════════════════════════════════
function showOverlay(html,onEnter){
  gameRunning=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="stars-bg" id="starsBg2"></div>`+html;
  ov.classList.remove('hidden');
  // Regenerate stars
  const sb=document.getElementById('starsBg2');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.style.cssText=`position:absolute;border-radius:50%;background:#fff;
      width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      opacity:${0.3+Math.random()*0.7};
      animation:blink ${1+Math.random()*3}s step-start infinite;
      animation-delay:${Math.random()*3}s;`;
    sb.appendChild(s);
  }
  const handler=(e)=>{
    if(e.type==='keydown'&&e.code!=='Enter')return;
    ov.classList.add('hidden');
    window.removeEventListener('keydown',handler);
    onEnter();
  };
  window.addEventListener('keydown',handler);
  ov.addEventListener('click',()=>{ov.classList.add('hidden');window.removeEventListener('keydown',handler);onEnter();},{once:true});
}

function showGameOver(){
  const savedLevel=levelIdx;
  const savedLevelName=LEVELS[levelIdx]?.name||'1-1';
  // Don't use showOverlay — we need two buttons
  gameRunning=false;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="stars-bg" id="starsBg2"></div>
    <div class="ov-title" style="color:#ff4444;text-shadow:4px 4px 0 #880000,0 0 20px #ff4444aa">GAME OVER</div>
    <div class="ov-sub">SCORE: ${String(score).padStart(6,'0')}</div>
    <div class="ov-menu" style="margin-top:16px;gap:10px">
      <button class="ov-btn" id="retryLevelBtn">▶ RETRY ${savedLevelName}</button>
      <button class="ov-btn" id="restartBtn2">↺ RESTART FROM 1-1</button>
    </div>
  `;
  ov.classList.remove('hidden');
  const sb=document.getElementById('starsBg2');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.style.cssText=`position:absolute;border-radius:50%;background:#fff;
      width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      opacity:${0.3+Math.random()*0.7};
      animation:blink ${1+Math.random()*3}s step-start infinite;
      animation-delay:${Math.random()*3}s;`;
    sb.appendChild(s);
  }
  document.getElementById('retryLevelBtn').addEventListener('click',()=>{
    ov.classList.add('hidden');
    lives=3;coinCount=0;levelIdx=savedLevel;
    buildLevel(levelIdx);gameRunning=true;
  });
  document.getElementById('restartBtn2').addEventListener('click',()=>{
    ov.classList.add('hidden');
    score=0;lives=3;coinCount=0;levelIdx=0;
    buildLevel(0);gameRunning=true;
  });
}
function showVictory(){
  showOverlay(`
    <div class="ov-title" style="color:#ffd700">YOU WIN!</div>
    <div class="ov-sub">FINAL SCORE: ${String(score).padStart(6,'0')}</div>
    <div style="font-size:7px;color:#aaa;margin:16px 0">★ THANKS FOR PLAYING ★</div>
    <div class="blink ov-btn" style="margin-top:8px">▶ PLAY AGAIN</div>
  `,()=>{score=0;lives=3;coinCount=0;levelIdx=0;buildLevel(0);gameRunning=true;_lastTime=performance.now();_accumulator=0;requestAnimationFrame(loop);});
}
function showLevelTransition(name,cb){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="ov-title" style="font-size:20px">${name}</div><div class="ov-sub" style="margin-top:8px">GET READY!</div>`;
  ov.classList.remove('hidden');
  setTimeout(()=>{ov.classList.add('hidden');cb();},2000);
}

// ═══════════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════════
let _lastTime=0, _accumulator=0;
function loop(now){
  const STEP = 1000/60;          // 16.667ms per logic tick
  _accumulator += now - _lastTime;
  _lastTime = now;
  // Clamp to avoid spiral of death after tab switch etc.
  if(_accumulator > 200) _accumulator = 200;
  // Only run logic ticks when a full 16.67ms has accumulated
  while(_accumulator >= STEP){
    update();
    _accumulator -= STEP;
  }
  draw();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click',startGame);
window.addEventListener('keydown',e=>{if(e.code==='Enter'&&!gameRunning&&document.getElementById('overlay').classList.contains('hidden')===false)startGame();});

// Cheat code: Space x4 on home screen unlocks level select
let _cheatCount=0, _cheatTimer=null;
window.addEventListener('keydown',e=>{
  if(gameRunning) return;
  if(document.getElementById('overlay').classList.contains('hidden')) return;
  if(e.code==='Space'){
    e.preventDefault();
    _cheatCount++;
    clearTimeout(_cheatTimer);
    _cheatTimer=setTimeout(()=>{ _cheatCount=0; },2000);
    if(_cheatCount>=4){
      _cheatCount=0;
      const ls=document.getElementById('levelSelect');
      ls.style.display='block';
      ls.style.animation='none';
      // Flash effect
      ls.style.opacity='0';
      setTimeout(()=>{ ls.style.transition='opacity 0.4s'; ls.style.opacity='1'; },10);
      // Cheat sound
      try{ initAudio(); beep(880,0.1,'square',0.15); setTimeout(()=>beep(1100,0.1,'square',0.15),150); }catch(e){}
    }
  }
});

// Level select buttons
[0,1,2].forEach(i=>{
  document.getElementById('lvlBtn'+i).addEventListener('click',()=>{
    initAudio();
    document.getElementById('overlay').classList.add('hidden');
    score=0;lives=3;coinCount=0;levelIdx=i;
    buildLevel(i);
    gameRunning=true;
  });
});

function startGame(){
  initAudio();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('levelSelect').style.display='none';
  score=0;lives=3;coinCount=0;levelIdx=0;
  buildLevel(0);
  gameRunning=true;
  requestAnimationFrame(loop);
}

// Restart HUD button
document.getElementById('restartHudBtn').addEventListener('click',()=>{
  score=0;lives=3;coinCount=0;levelIdx=0;
  buildLevel(0);gameRunning=true;
});

// Start idle animation
buildLevel(0);
requestAnimationFrame(loop);
</script>
